name: Metrics

on:
  # Schedule updates (each hour)
  schedule:
    - cron: "0 * * * *"
  # Run manually and on each commit
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Ensure METRICS_TOKEN is available
        shell: bash
        run: |
          if [ -z "${{ secrets.METRICS_TOKEN }}" ]; then
            echo "ERROR: METRICS_TOKEN is empty or unavailable to this workflow."
            echo "Add it here: Settings -> Secrets and variables -> Actions -> Repository secrets"
            echo "Name: METRICS_TOKEN  Value: (your GitHub classic PAT)"
            exit 1
          fi
          echo "METRICS_TOKEN is present."

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Yetval1234556
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Chicago

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: X

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
